# docker-compose.yml

services:
  mysql:
    image: mysql:8 # Uses pre-built MySQL 8 image from Docker Hub
    container_name: kloe-mysql # Fixed container name (not auto-generated)
    environment: 
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # Reads from .env file
      MYSQL_DATABASE: ${MYSQL_DATABASE}           # Database to create
      MYSQL_USER: ${MYSQL_USER}                   # Additional user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}           # User's password
    ports:
      - "3306:3306"                               # Host:Container - access MySQL from your computer
    volumes:
      - mysql_data:/var/lib/mysql                 # Named volume (data survives container restart)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s       # Check every 10 seconds
      timeout: 10s        # Wait max 10s for response
      retries: 5          # Fail after 5 failures
      start_period: 30s   # Give MySQL time to initialize
    networks:
      - kloe-network                      # Attach to this network
    command: --mysql-native-password=ON   # MySQL server option for better compatibility

  api:
    build: . # Build image from Dockerfile in current directory
    container_name: kloe-api # Fixed container name
    ports:
      - "8000:8000" # Host port 8000 → Container port 8000
    environment:
      MYSQL_HOST: mysql                 # Points to mysql service (DNS name)
      MYSQL_USER: ${MYSQL_USER}         # From .env file
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy      # Wait for MySQL to be healthy before starting
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - kloe-network
    restart: unless-stopped # Auto-restart unless manually stopped

  # Add an init service to run init_bdt.py automatically
  init-db: # Same Dockerfile as API
    build: .
    container_name: kloe-init
    command: python init_bdt.py # OVERRIDES the Dockerfile CMD
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # Extra for root access
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kloe-network
    volumes:
      - ./models:/app/models  # Mount local ./models folder into container
    profiles:
      - init  # Only run when explicitly requested. Prevents auto-start with docker-compose up

volumes:
  mysql_data: # Named volume (persists database data)

networks:
  kloe-network:
    driver: bridge # Default Docker network type
